<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shilingi ($SHI) | The People's Coin</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c29 100%);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        /* Logo Placeholder */
        .logo-container {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #d4af37 0%, #f1c40f 100%);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #a0a0a0;
            font-size: 1rem;
            margin-top: 8px;
            font-style: italic;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #d4af37;
            letter-spacing: 1px;
            display: block;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .contract-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 25px;
        }

        .contract-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
            display: block;
        }

        .address {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            word-break: break-all;
            color: #d4af37;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .btn-primary {
            background: #d4af37;
            color: #1a1a2e;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <!-- Logo Section -->
        <div class="logo-container">
            <span class="logo-text">SHI</span>
        </div>

        <h1>Shilingi</h1>
        <p class="tagline">Built in the shadows. Spent in the streets.</p>

        <!-- Stats Section -->
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Total Supply</span>
                <span class="stat-value">21,000,000</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Network</span>
                <span class="stat-value">Devnet</span>
            </div>
        </div>

        <!-- Contract Address Section -->
        <div class="contract-section">
            <span class="contract-label">Contract Address</span>
            <div class="address">CjmESDhKyyr9JusD2ZxwYQEDM3226gqW9gGY8xWA1Ds7</div>
        </div>

        <!-- Call to Action -->
        <div class="btn-group">
            <a href="https://solscan.io/token/CjmESDhKyyr9JusD2ZxwYQEDM3226gqW9gGY8xWA1Ds7?cluster=devnet" target="_blank" class="btn btn-primary">
                View on Solscan
            </a>
            <button class="btn btn-secondary" onclick="copyAddress()">
                Copy Address
            </button>
        </div>
    </div>

    <script>
        function copyAddress() {
            const address = "CjmESDhKyyr9JusD2ZxwYQEDM3226gqW9gGY8xWA1Ds7";
            navigator.clipboard.writeText(address);
            alert("Address copied to clipboard!");
        }
    </script>

</body>
</html>
